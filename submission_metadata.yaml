methodology_summary: >
  A 7-stage pipeline that ranks candidates by career evidence over keyword claims.
  Requirement coverage weights what a candidate has built (career descriptions) above
  what they list as skills, and discounts skill claims contradicted by on-platform
  assessment scores — defeating keyword-stuffers. Hybrid retrieval (bge-large dense +
  BM25) surfaces strong fits who don't use JD buzzwords. A precision-first honeypot
  detector flags subtly impossible profiles (e.g. summary-claimed YOE contradicting the
  YOE field). Final scores come from a rank-average of a transparent feature composite
  and a LightGBM lambdarank model, selected by 5-fold cross-validation on a 95-candidate
  hand-labeled anchor (held-out Spearman 0.85). The ranking step (rank.py) is CPU-only,
  no network, runs in ~8 seconds on precomputed artifacts. Zero paid API: embeddings and
  training labels are produced locally. A hard gate (no unfit candidate may outrank a
  strong fit) drove iterative debugging that surfaced and fixed real systematic biases.
